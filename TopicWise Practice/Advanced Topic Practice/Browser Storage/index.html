<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: white;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .dark-theme{
            background-color: rgb(19, 19, 19);
            color: white;
        }
        button{
            background-color: rgb(74, 74, 255);
            color: white;
            font-size: 2rem;
            padding: 1rem;
            border-radius: 1rem;
        }

.login-container {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    width: 300px;
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100px;
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button[type="submit"] {
    background-color: #28a745;
    color: white;
}

#clear-btn {
    background-color: #dc3545;
    color: white;
}
    </style>
</head>
<body>
    <h1>Choose light or dark theme</h1>
    <button id="toggle-btn">Toggle Modes</button>
    <hr>
    <hr>
    <div class="login-container">
        <h2>Login</h2>
        <form id="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter your username" required>
            
            <button id="login-btn" type="submit">Login</button>
            <button type="button" id="clear-btn">Clear</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
