<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <header>
        <h1>Grocery List Manager</h1>
        <button id="dark-mode-toggle"><i class="fa-solid fa-circle-half-stroke"></i></button>
    </header>
    <main>
        <section>
            <input type="text" id="item-input" placeholder="Add a new item">
            <input type="number" id="quantity-input" placeholder="Quantity" min="1">
            <select name="" id="category-input">
                <option value="produce">Produce</option>
                <option value="dairy">Dairy</option>
                <option value="bakery">Bakery</option>
                <option value="pantry">Pantry</option>
                <option value="frozen">Frozen</option>
                <option value="beverages">Beverages</option>
                <option value="misc">Miscellaneous</option>
            </select>
            <button id="add-item">Add Item</button>
        </section>
        <section>
            <div id="sort-header">
                <h2>Grocery List</h2>
                <div>
                    <span>Sort-By</span>
                    <select name="" id="sorting-category">
                        <option value="All">All</option>
                        <option value="produce">Produce</option>
                        <option value="dairy">Dairy</option>
                        <option value="bakery">Bakery</option>
                        <option value="pantry">Pantry</option>
                        <option value="frozen">Frozen</option>
                        <option value="beverages">Beverages</option>
                        <option value="misc">Miscellaneous</option>
                    </select>
                </div>
            </div>
            <table id="grocery-list">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Category</th>
                        <th>Edit</th>
                    </tr>
                </thead>
                <tbody id="grocery-list-body">
                    <!-- List Item Will Appear Here -->
                </tbody>
            </table>
        </section>
    </main>
    
    <!-- Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Item</h2>
            <input type="text" id="edit-item-input" placeholder="Edit item">
            <input type="number" id="edit-quantity-input" placeholder="Edit quantity" min="1">
            <select name="" id="edit-category-input">
                <option value="produce">Produce</option>
                <option value="dairy">Dairy</option>
                <option value="bakery">Bakery</option>
                <option value="pantry">Pantry</option>
                <option value="frozen">Frozen</option>
                <option value="beverages">Beverages</option>
                <option value="misc">Miscellaneous</option>
            </select>
            <button id="save-item">Save</button>
            <button id="delete-item">Delete</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
