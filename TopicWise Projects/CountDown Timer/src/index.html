<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="output.css">
  <title>Document</title>
</head>

<body>
  <div class="flex items-center justify-center h-100 w-full gap-4 count-down-main">
    <div class="timer w-16">
      <div class=" bg-indigo-600 py-4 px-2 rounded-lg overflow-hidden">
        <h3 id="days" class="countdown-element days font-Cormorant font-semibold text-2xl text-white text-center">00
        </h3>
      </div>
      <p class="text-lg font-Cormorant font-medium text-gray-900 mt-1 text-center w-full">days</p>
    </div>
    <h3 class="font-manrope font-semibold text-2xl text-gray-900">:</h3>
    <div class="timer w-16">
      <div class=" bg-indigo-600 py-4 px-2 rounded-lg overflow-hidden">
        <h3 id="hours" class="countdown-element hours font-Cormorant font-semibold text-2xl text-white text-center">00
        </h3>
      </div>
      <p class="text-lg font-Cormorant font-normal text-gray-900 mt-1 text-center w-full">hours</p>
    </div>
    <h3 class="font-manrope font-semibold text-2xl text-gray-900">:</h3>
    <div class="timer w-16">
      <div class=" bg-indigo-600 py-4 px-2 rounded-lg overflow-hidden">
        <h3 id="minutes" class="countdown-element minutes font-Cormorant font-semibold text-2xl text-white text-center">00
        </h3>
      </div>
      <p class="text-lg font-Cormorant font-normal text-gray-900 mt-1 text-center w-full">minutes</p>
    </div>
    <h3 class="font-manrope font-semibold text-2xl text-gray-900">:</h3>
    <div class="timer w-16">
      <div class=" bg-indigo-600 py-4 px-2 rounded-lg overflow-hidden ">
        <h3 id="seconds"
          class="countdown-element seconds font-Cormorant font-semibold text-2xl text-white text-center animate-countinsecond">
          00
        </h3>
      </div>
      <p class="text-lg font-Cormorant font-normal text-gray-900 mt-1 text-center w-full">seconds</p>
    </div>
  </div>
  <div>
    <p id="alert" class=" hidden text-2xl text-amber-300 font-bold block text-center ">CountDown Completed!</p>
  </div>

  <script src="app.js"></script>
</body>

</html>
