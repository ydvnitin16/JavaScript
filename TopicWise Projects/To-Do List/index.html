<!DOCTYPE html>
<html lang="en">

<head>
    <title>TO-DO List</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- create a container for the todo list -->
    <div id="todo-container">
        <!-- todo list header -->
        <div id="header">
            <h1>To Do List</h1>
        </div>

        <!-- create input box -->
        <div id="todo-form">
            <input type="text" class="input-item" name="input_box" id="input-box" placeholder="Add Task" />

            <!-- add button  -->
            <button id="input-button">Add</button>
        </div>

        <!-- task list -->
        <h2>Task List</h2>
        <ul id="list-container">
            <!-- <li>
        <label>
            <input type="checkbox">
            <span>Task1</span>
          </label>
          <span class="edit-btn">Edit</span>
          <span class="delete-btn">Delete</span>
        </li> -->
        </ul>

        <hr>

        <!-- task list counter  -->
        <div class="counter-container">
            <div id="task-counters">
                Completed: <span id="completed-counter">0</span> | Incompleted:
                <span id="incompleted-counter">0</span>
            </div>
        </div>
    </div>
    <!-- Edit Modal -->
    <div class="edit-modal hide">
        <div class="modal-content">
            <input type="text" id="edit-input" placeholder="edit task">
            <button id="save-edit">Save</button>
            <button id="cancel-edit">Cancel</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
